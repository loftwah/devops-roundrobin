apiVersion: v1
kind: ConfigMap
metadata:
  name: round-robin-config
data:
  APP_ENV: "kubernetes-raw"
  LOG_LEVEL: "INFO"
  APP_HTTP_ADDR: ":8080"
  WORKER_HTTP_ADDR: ":8081"
  POSTGRES_USER: "roundrobin"
  POSTGRES_DB: "roundrobin"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  JOB_QUEUE_NAME: "round-robin-jobs"

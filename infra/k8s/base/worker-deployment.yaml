apiVersion: apps/v1
kind: Deployment
metadata:
  name: round-robin-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: round-robin-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: round-robin-worker
    spec:
      containers:
        - name: worker
          image: round-robin-worker:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: round-robin-config
            - secretRef:
                name: round-robin-secrets
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "round-robin.fullname" . }}-app
  labels:
    {{- include "round-robin.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "round-robin.fullname" . }}-app
                port:
                  number: {{ .Values.app.service.port }}
{{- end }}


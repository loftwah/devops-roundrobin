apiVersion: v1
kind: Service
metadata:
  name: {{ include "round-robin.fullname" . }}-postgres
  labels:
    {{- include "round-robin.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    {{- include "round-robin.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres


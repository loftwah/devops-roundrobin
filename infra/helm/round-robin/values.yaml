global:
  appEnv: kubernetes-helm
  logLevel: INFO
  jobQueueName: round-robin-jobs
  postgres:
    user: roundrobin
    password: roundrobin
    database: roundrobin
  redis:
    password: ""

app:
  replicaCount: 1
  image:
    repository: round-robin-app
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

worker:
  replicaCount: 1
  image:
    repository: round-robin-worker
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  image: postgres:17-alpine
  storage: 2Gi

redis:
  image: redis:8-alpine

ingress:
  enabled: true
  className: nginx
  host: app.127.0.0.1.nip.io

monitoring:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
